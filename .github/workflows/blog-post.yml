name: Generate City Blog Post

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch: {}       # Manual trigger

jobs:
  create-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Adobe IMS token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST 'https://ims-na1.adobelogin.com/ims/token/v3' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.ADOBE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ADOBE_CLIENT_SECRET }}" \
            -d "scope=openid,AdobeID,read_organizations,aem.frontend.all,additional_info.projectedProductContext" \
            | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Failed to fetch Adobe IMS token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Write MCP config
        env:
          DA_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          jq -n --arg token "$DA_TOKEN" '{
            mcpServers: {
              "da-aem": {
                type: "http",
                url: "https://da-mcp.adobeaem.workers.dev/mcp",
                headers: {
                  Authorization: ("Bearer " + $token)
                }
              }
            }
          }' > /tmp/mcp.json
          echo "MCP config written:"
          jq '.mcpServers["da-aem"] | {type, url, has_auth: (.headers.Authorization | length > 0)}' /tmp/mcp.json

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            --mcp-config /tmp/mcp.json \
            --strict-mcp-config \
            --allowedTools 'mcp__da-aem__*' \
            -- "You have access to an MCP server called da-aem for authoring content on an AEM Edge Delivery Services site.

          Your task: Create a blog post about a city that has NOT been previously covered.

          IMPORTANT path mapping: The DA (Document Authoring) path for this site is /aemsites/author-kit/blog.
          The published site is https://main--author-kit--aemsites.aem.live/blog.
          All DA MCP operations (list, write, etc.) must use the DA path: /aemsites/author-kit/blog/<city-name-slug>

          Instructions:
          1. First, use the da-aem MCP tools to list what exists under /aemsites/author-kit/blog to see which cities have already been covered. Avoid duplicating a city.
          2. Pick an interesting city from anywhere in the world that hasn't been covered yet.
          3. Write an engaging, informative blog post about the city. The blog post MUST start with a hero image at the top — use a publicly available image URL from Unsplash or Wikimedia Commons showing the city skyline or a famous landmark. Then cover:
             - A brief history
             - Top attractions and things to do
             - Local food and culture
             - Best time to visit
             - Practical travel tips
          4. Use the da-aem MCP tools to create the blog post at the DA path /aemsites/author-kit/blog/<city-name-slug>
          5. Confirm the post was created successfully and will be viewable at https://main--author-kit--aemsites.aem.live/blog/<city-name-slug>"
